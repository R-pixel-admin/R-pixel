<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>R-pixel</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { user-select: none; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c12; overflow: hidden; font-family: monospace; }
        .map-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0c12; }
        .canvas-wrapper { position: absolute; top: 0; left: 0; transform-origin: 0 0; cursor: grab; }
        .canvas-wrapper:active { cursor: grabbing; }
        .pixel-grid { display: grid; grid-template-columns: repeat(150, 12px); background-color: #1e212b; border: 1px solid #2e2f3e; }
        .pixel { width: 12px; height: 12px; background-color: #2b2b2b; }
        .palette { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 8px 12px; background: #1e1f2ccc; backdrop-filter: blur(8px); border-radius: 16px; z-index: 100; pointer-events: auto; }
        .color-swatch { width: 36px; height: 36px; border-radius: 8px; cursor: pointer; border: 2px solid #fff; }
        .color-swatch.active { border: 3px solid #ff0; transform: scale(1.05); }
        .zoom-info { position: fixed; top: 16px; right: 16px; background: #1e1f2ccc; backdrop-filter: blur(8px); padding: 4px 12px; border-radius: 16px; color: white; font-size: 14px; z-index: 100; pointer-events: none; }
        .slot-info { position: fixed; bottom: 80px; left: 16px; background: #1e1f2ccc; backdrop-filter: blur(8px); padding: 8px 12px; border-radius: 16px; color: white; font-size: 12px; z-index: 100; font-family: monospace; }
        .slot-info span { display: inline-block; width: 28px; height: 28px; border-radius: 6px; margin: 0 4px; vertical-align: middle; border: 2px solid #fff; }
        .slot-info .slot-label { display: inline-block; margin: 0 6px 0 0; }
        .slot-info .active-slot { border: 2px solid #ff0; box-shadow: 0 0 6px #ff0; }
        .welcome-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s ease; }
        .welcome-card { background: linear-gradient(135deg, #1e1f2c, #14161f); border-radius: 24px; padding: 24px 32px; max-width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.5); animation: popIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .welcome-card h2 { font-size: 32px; margin-bottom: 12px; background: linear-gradient(135deg, #ffcc33, #ff9933); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .welcome-card p { color: #ccc; font-size: 16px; margin: 12px 0; line-height: 1.5; }
        .feature-list { text-align: left; margin: 20px 0; padding-left: 20px; }
        .feature-list li { color: #ffaa44; margin: 8px 0; font-size: 14px; }
        .feature-list li span { color: #aaa; }
        .close-btn { background: #ff6600; border: none; color: white; padding: 12px 28px; border-radius: 40px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 16px; transition: all 0.2s; font-family: monospace; }
        .close-btn:hover { background: #ff4400; transform: scale(1.02); }
        @media (max-width: 600px) { .welcome-card { margin: 20px; padding: 20px; } .welcome-card h2 { font-size: 24px; } .color-swatch { width: 28px; height: 28px; } .palette { gap: 6px; padding: 6px 10px; } .pixel { width: 8px; height: 8px; } .pixel-grid { grid-template-columns: repeat(150, 8px); } .slot-info { bottom: 70px; left: 8px; font-size: 10px; } .slot-info span { width: 22px; height: 22px; } }
    </style>
</head>
<body>
<div class="map-container" id="mapContainer">
    <div class="canvas-wrapper" id="canvasWrapper">
        <div class="pixel-grid" id="pixelGrid"></div>
    </div>
</div>
<div class="palette" id="colorPalette"></div>
<div class="zoom-info" id="zoomInfo">zoom: 1x</div>
<div class="slot-info" id="slotInfo">
    <span class="slot-label">🎨</span>
    <span id="slot1Color"></span> 1
    <span id="slot2Color"></span> 2
    <span style="margin-left:6px">␣ свап | R палитра</span>
</div>

<div id="welcomeOverlay" class="welcome-overlay">
    <div class="welcome-card">
        <h2>R-PIXEL</h2>
        <p>Коллективное пиксельное полотно 150x150</p>
        <ul class="feature-list">
            <li>• <span>Клик — поставить пиксель</span></li>
            <li>• <span>ПКМ + вести — рисовать кистью</span></li>
            <li>• <span><strong>1</strong> / <strong>2</strong> — сохранить цвет в слот</span></li>
            <li>• <span><strong>Пробел</strong> — свап между слотами</span></li>
            <li>• <span><strong>R</strong> — выбрать любой цвет</span></li>
        </ul>
        <button class="close-btn" id="closeWelcome">ПРИСТУПИТЬ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-ebYwVRC_1XC4TQ9Xv04eD8Gcsj8gb2A",
        authDomain: "r-pixel.firebaseapp.com",
        databaseURL: "https://r-pixel-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "r-pixel",
        storageBucket: "r-pixel.firebasestorage.app",
        messagingSenderId: "324759212498",
        appId: "1:324759212498:web:92e4032fc10055d8bbf80b",
        measurementId: "G-5VVF2Q7K8L"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const SIZE = 150;
    const TOTAL_PIXELS = SIZE * SIZE;
    const PIXEL_SIZE = window.innerWidth <= 600 ? 8 : 12;
    const COLOR_PALETTE = ["#2b2b2b","#8b3c2c","#d64531","#e8b84c","#6aa84f","#3b6e4b","#2c5e6e","#4c76b0","#6f4f8c","#bc85a3","#d4c4a8","#f7f3e0"];
    let pixelData = new Array(TOTAL_PIXELS).fill(COLOR_PALETTE[0]);
    let currentColor = COLOR_PALETTE[1];
    
    let slot1Color = COLOR_PALETTE[5];
    let slot2Color = COLOR_PALETTE[7];
    let activeSlot = 1;
    
    let gridRendered = false;
    
    const gridContainer = document.getElementById("pixelGrid");
    const paletteDiv = document.getElementById("colorPalette");
    const canvasWrapper = document.getElementById("canvasWrapper");
    const mapContainer = document.getElementById("mapContainer");
    const zoomInfo = document.getElementById("zoomInfo");
    const slot1Span = document.getElementById("slot1Color");
    const slot2Span = document.getElementById("slot2Color");
    
    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let lastTranslateX = 0;
    let lastTranslateY = 0;
    let hasMoved = false;
    let isDrawing = false;
    
    function updateTransform() {
        canvasWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        zoomInfo.innerText = `zoom: ${scale.toFixed(1)}x`;
    }
    
    function centerCanvas() {
        const gridWidth = SIZE * PIXEL_SIZE * scale;
        const gridHeight = SIZE * PIXEL_SIZE * scale;
        translateX = (window.innerWidth - gridWidth) / 2;
        translateY = (window.innerHeight - gridHeight) / 2;
        updateTransform();
    }
    
    function updateSlotsDisplay() {
        slot1Span.style.backgroundColor = slot1Color;
        slot2Span.style.backgroundColor = slot2Color;
        if (activeSlot === 1) {
            slot1Span.classList.add("active-slot");
            slot2Span.classList.remove("active-slot");
        } else {
            slot1Span.classList.remove("active-slot");
            slot2Span.classList.add("active-slot");
        }
    }
    
    function swapSlots() {
        const tempColor = slot1Color;
        slot1Color = slot2Color;
        slot2Color = tempColor;
        activeSlot = activeSlot === 1 ? 2 : 1;
        currentColor = activeSlot === 1 ? slot1Color : slot2Color;
        updateSlotsDisplay();
        updateActiveSwatch();
    }
    
    function setSlot1() {
        slot1Color = currentColor;
        activeSlot = 1;
        currentColor = slot1Color;
        updateSlotsDisplay();
        updateActiveSwatch();
    }
    
    function setSlot2() {
        slot2Color = currentColor;
        activeSlot = 2;
        currentColor = slot2Color;
        updateSlotsDisplay();
        updateActiveSwatch();
    }
    
    function openColorPicker() {
        const input = document.createElement("input");
        input.type = "color";
        input.value = currentColor;
        input.addEventListener("input", (e) => {
            currentColor = e.target.value;
            updateActiveSwatch();
        });
        input.click();
    }
    
    function onKeyDown(e) {
        const key = e.key;
        
        if (key === '1') {
            e.preventDefault();
            setSlot1();
        }
        else if (key === '2') {
            e.preventDefault();
            setSlot2();
        }
        else if (key === ' ') {
            e.preventDefault();
            swapSlots();
        }
        else if (key === 'r' || key === 'R') {
            e.preventDefault();
            openColorPicker();
        }
    }
    
    function updateActiveSwatch() {
        const swatches = document.querySelectorAll(".color-swatch");
        let found = false;
        swatches.forEach(el => {
            if (el.style.backgroundColor === currentColor) {
                el.classList.add("active");
                found = true;
            } else {
                el.classList.remove("active");
            }
        });
    }
    
    function onMouseDown(e) {
        if (e.button === 0) {
            isDragging = true;
            hasMoved = false;
            dragStartX = e.clientX - translateX;
            dragStartY = e.clientY - translateY;
            lastTranslateX = translateX;
            lastTranslateY = translateY;
            canvasWrapper.style.cursor = "grabbing";
            e.preventDefault();
        }
    }
    
    function onMouseMove(e) {
        if (isDragging) {
            const newTranslateX = e.clientX - dragStartX;
            const newTranslateY = e.clientY - dragStartY;
            if (!hasMoved && (Math.abs(newTranslateX - lastTranslateX) > 3 || Math.abs(newTranslateY - lastTranslateY) > 3)) {
                hasMoved = true;
            }
            translateX = newTranslateX;
            translateY = newTranslateY;
            updateTransform();
        }
    }
    
    function onMouseUp(e) {
        if (isDragging) {
            isDragging = false;
            canvasWrapper.style.cursor = "grab";
        }
        if (isDrawing) isDrawing = false;
    }
    
    function onContextMenu(e) {
        e.preventDefault();
        return false;
    }
    
    function onRightMouseDown(e) {
        if (e.button === 2) {
            isDrawing = true;
            e.preventDefault();
            return false;
        }
    }
    
    function onWheel(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        let newScale = scale + delta;
        newScale = Math.min(Math.max(0.3, newScale), 3);
        if (newScale === scale) return;
        
        const rect = mapContainer.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        const beforeX = (mouseX - translateX) / scale;
        const beforeY = (mouseY - translateY) / scale;
        scale = newScale;
        const afterX = (mouseX - translateX) / scale;
        const afterY = (mouseY - translateY) / scale;
        
        translateX += (afterX - beforeX) * scale;
        translateY += (afterY - beforeY) * scale;
        updateTransform();
    }
    
    let touchStartDistance = 0;
    let touchStartScale = 1;
    
    function getTouchDistance(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }
    
    function onTouchStart(e) {
        if (e.touches.length === 1) {
            isDragging = true;
            hasMoved = false;
            dragStartX = e.touches[0].clientX - translateX;
            dragStartY = e.touches[0].clientY - translateY;
            lastTranslateX = translateX;
            lastTranslateY = translateY;
            e.preventDefault();
        } else if (e.touches.length === 2) {
            isDragging = false;
            touchStartDistance = getTouchDistance(e.touches);
            touchStartScale = scale;
            e.preventDefault();
        }
    }
    
    function onTouchMove(e) {
        if (e.touches.length === 1 && isDragging) {
            const newTranslateX = e.touches[0].clientX - dragStartX;
            const newTranslateY = e.touches[0].clientY - dragStartY;
            if (!hasMoved && (Math.abs(newTranslateX - lastTranslateX) > 5 || Math.abs(newTranslateY - lastTranslateY) > 5)) {
                hasMoved = true;
            }
            translateX = newTranslateX;
            translateY = newTranslateY;
            updateTransform();
            e.preventDefault();
        } else if (e.touches.length === 2) {
            const newDistance = getTouchDistance(e.touches);
            const newScale = touchStartScale * (newDistance / touchStartDistance);
            scale = Math.min(Math.max(0.3, newScale), 3);
            updateTransform();
            e.preventDefault();
        }
    }
    
    function onTouchEnd(e) {
        isDragging = false;
        if (isDrawing) isDrawing = false;
        e.preventDefault();
    }
    
    mapContainer.addEventListener("mousedown", onMouseDown);
    mapContainer.addEventListener("mousemove", onMouseMove);
    mapContainer.addEventListener("mouseup", onMouseUp);
    mapContainer.addEventListener("wheel", onWheel, { passive: false });
    mapContainer.addEventListener("contextmenu", onContextMenu);
    mapContainer.addEventListener("mousedown", onRightMouseDown);
    mapContainer.addEventListener("touchstart", onTouchStart);
    mapContainer.addEventListener("touchmove", onTouchMove);
    mapContainer.addEventListener("touchend", onTouchEnd);
    window.addEventListener("keydown", onKeyDown);
    
    function getPixelId(row, col) { return `${row}_${col}`; }
    function parseIdToCoords(id) { const [row, col] = id.split("_").map(Number); return { row, col }; }
    
    function renderFullGrid() {
        if (!gridContainer) return;
        if (!gridRendered) {
            gridContainer.innerHTML = "";
            gridContainer.style.gridTemplateColumns = `repeat(${SIZE}, ${PIXEL_SIZE}px)`;
            for (let i = 0; i < TOTAL_PIXELS; i++) {
                const row = Math.floor(i / SIZE);
                const col = i % SIZE;
                const pixel = document.createElement("div");
                pixel.className = "pixel";
                pixel.style.width = `${PIXEL_SIZE}px`;
                pixel.style.height = `${PIXEL_SIZE}px`;
                pixel.dataset.row = row;
                pixel.dataset.col = col;
                
                pixel.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (hasMoved) return;
                    setPixelColor(row, col, currentColor);
                });
                
                pixel.addEventListener("mouseenter", () => {
                    if (isDrawing) setPixelColor(row, col, currentColor);
                });
                
                pixel.addEventListener("touchstart", (e) => {
                    e.stopPropagation();
                    setPixelColor(row, col, currentColor);
                });
                
                gridContainer.appendChild(pixel);
            }
            gridRendered = true;
        }
        for (let i = 0; i < TOTAL_PIXELS; i++) {
            const pixelDiv = gridContainer.children[i];
            if (pixelDiv) pixelDiv.style.backgroundColor = pixelData[i] || COLOR_PALETTE[0];
        }
    }
    
    function updatePixelUI(row, col, colorHex) {
        const index = row * SIZE + col;
        if (index >= 0 && index < TOTAL_PIXELS) {
            pixelData[index] = colorHex;
            const pixelDiv = gridContainer.children[index];
            if (pixelDiv) pixelDiv.style.backgroundColor = colorHex;
        }
    }
    
    function loadInitialFromFirebase() {
        const pixelsRef = db.ref("pixels");
        pixelsRef.once("value", (snapshot) => {
            const fbData = snapshot.val();
            if (fbData && typeof fbData === "object") {
                for (const [pixelId, colorValue] of Object.entries(fbData)) {
                    if (typeof colorValue === "string" && colorValue.length > 0) {
                        const { row, col } = parseIdToCoords(pixelId);
                        if (!isNaN(row) && !isNaN(col) && row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                            const idx = row * SIZE + col;
                            pixelData[idx] = colorValue;
                        }
                    }
                }
            }
            renderFullGrid();
        }).catch(err => console.warn(err));
        
        pixelsRef.on("child_changed", (snapshot) => {
            const pixelId = snapshot.key;
            const newColor = snapshot.val();
            if (pixelId && newColor && typeof newColor === "string") {
                const { row, col } = parseIdToCoords(pixelId);
                if (!isNaN(row) && !isNaN(col) && row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                    updatePixelUI(row, col, newColor);
                }
            }
        });
        
        pixelsRef.on("child_added", (snapshot) => {
            const pixelId = snapshot.key;
            const newColor = snapshot.val();
            if (pixelId && newColor && typeof newColor === "string") {
                const { row, col } = parseIdToCoords(pixelId);
                if (!isNaN(row) && !isNaN(col) && row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                    updatePixelUI(row, col, newColor);
                }
            }
        });
    }
    
    async function setPixelColor(row, col, colorHex) {
        const pixelId = getPixelId(row, col);
        const currentColorAtPixel = pixelData[row * SIZE + col];
        if (currentColorAtPixel === colorHex) return;
        updatePixelUI(row, col, colorHex);
        const pixelRef = db.ref(`pixels/${pixelId}`);
        try { await pixelRef.set(colorHex); } catch (err) { console.warn(err); }
    }
    
    function buildPalette() {
        paletteDiv.innerHTML = "";
        COLOR_PALETTE.forEach((colorHex) => {
            const swatch = document.createElement("div");
            swatch.className = "color-swatch";
            swatch.style.backgroundColor = colorHex;
            if (colorHex === currentColor) swatch.classList.add("active");
            swatch.addEventListener("click", () => {
                currentColor = colorHex;
                document.querySelectorAll(".color-swatch").forEach(el => el.classList.remove("active"));
                swatch.classList.add("active");
            });
            paletteDiv.appendChild(swatch);
        });
    }
    
    function initWelcomePopup() {
        const overlay = document.getElementById('welcomeOverlay');
        const closeBtn = document.getElementById('closeWelcome');
        function closePopup() {
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }
        closeBtn.addEventListener('click', closePopup);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });
    }
    
    function init() {
        buildPalette();
        loadInitialFromFirebase();
        centerCanvas();
        canvasWrapper.style.cursor = "grab";
        initWelcomePopup();
        updateSlotsDisplay();
    }
    
    window.addEventListener("resize", () => centerCanvas());
    window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>

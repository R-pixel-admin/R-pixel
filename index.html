<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PixelCanvas — r/place style</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #0a0c12 0%, #14181f 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', 'Courier New', monospace; margin: 0; padding: 24px; }
        .canvas-container { background: #1e1f2c; border-radius: 2rem; padding: 1.5rem; box-shadow: 0 20px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05); backdrop-filter: blur(0px); }
        .pixel-grid { display: grid; grid-template-columns: repeat(50, 1fr); background-color: #0b0d15; border: 2px solid #2e2f3e; border-radius: 1rem; overflow: hidden; width: min(85vw, 85vh, 800px); height: min(85vw, 85vh, 800px); aspect-ratio: 1 / 1; box-shadow: 0 8px 18px rgba(0,0,0,0.5); }
        .pixel { background-color: #1e212b; transition: all 0.03s ease; cursor: pointer; border: 0.5px solid rgba(60, 65, 85, 0.3); }
        .pixel:hover { filter: brightness(1.3) saturate(1.4); transform: scale(1.02); z-index: 2; box-shadow: 0 0 0 1px #f0f0ff, inset 0 0 4px rgba(255,255,200,0.6); border-radius: 2px; }
        .palette { margin-top: 1.8rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.7rem; padding: 0.8rem; background: #13161fcc; backdrop-filter: blur(8px); border-radius: 2rem; border: 1px solid #2e3347; }
        .color-swatch { width: 2.7rem; height: 2.7rem; border-radius: 1rem; cursor: pointer; transition: all 0.15s ease; box-shadow: 0 2px 6px rgba(0,0,0,0.3); border: 2px solid transparent; }
        .color-swatch:hover { transform: scale(1.15); filter: brightness(1.1); }
        .color-swatch.active { border: 3px solid white; box-shadow: 0 0 0 2px #5f7f9e, 0 0 0 5px #1e2a3a; transform: scale(1.05); }
        .info-panel { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem; padding: 0 0.5rem; color: #cddcf0; font-weight: 600; text-shadow: 0 1px 2px black; }
        .badge { background: #00000066; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.8rem; backdrop-filter: blur(4px); font-family: monospace; letter-spacing: 1px; }
        .status { background: #11161f; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.75rem; color: #9bb8e0; }
        h1 { margin: 0; font-size: 1.3rem; letter-spacing: -0.5px; background: linear-gradient(135deg, #e0eafc, #cfdef3); -webkit-background-clip: text; background-clip: text; color: transparent; }
        footer { text-align: center; margin-top: 1rem; font-size: 0.7rem; color: #566b8a; }
        @media (max-width: 600px) { .color-swatch { width: 2rem; height: 2rem; } .palette { gap: 0.5rem; } .pixel-grid { width: 92vw; height: 92vw; } }
    </style>
</head>
<body>
<div>
    <div class="canvas-container">
        <div class="info-panel">
            <h1>🎨 RETRO PLACE · 50x50</h1>
            <div class="status" id="liveStatus">💾 live sync</div>
        </div>
        <div class="pixel-grid" id="pixelGrid"></div>
        <div class="palette" id="colorPalette"></div>
        <footer>⚡ кликни пиксель — цвет меняется для всех | hover-эффект</footer>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-ebYwVRC_1XC4TQ9Xv04eD8Gcsj8gb2A",
        authDomain: "r-pixel.firebaseapp.com",
        databaseURL: "https://r-pixel-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "r-pixel",
        storageBucket: "r-pixel.firebasestorage.app",
        messagingSenderId: "324759212498",
        appId: "1:324759212498:web:92e4032fc10055d8bbf80b",
        measurementId: "G-5VVF2Q7K8L"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const SIZE = 100;
    const TOTAL_PIXELS = SIZE * SIZE;
    const COLOR_PALETTE = ["#2b2b2b","#8b3c2c","#d64531","#e8b84c","#6aa84f","#3b6e4b","#2c5e6e","#4c76b0","#6f4f8c","#bc85a3","#d4c4a8","#f7f3e0"];
    let pixelData = new Array(TOTAL_PIXELS).fill(COLOR_PALETTE[0]);
    let currentColor = COLOR_PALETTE[1];
    let gridRendered = false;
    const gridContainer = document.getElementById("pixelGrid");
    const paletteDiv = document.getElementById("colorPalette");
    
    function getPixelId(row, col) { return `${row}_${col}`; }
    
    function parseIdToCoords(id) { const [row, col] = id.split("_").map(Number); return { row, col }; }
    
    function renderFullGrid() {
        if (!gridContainer) return;
        if (!gridRendered) {
            gridContainer.innerHTML = "";
            for (let i = 0; i < TOTAL_PIXELS; i++) {
                const row = Math.floor(i / SIZE);
                const col = i % SIZE;
                const pixel = document.createElement("div");
                pixel.className = "pixel";
                pixel.dataset.row = row;
                pixel.dataset.col = col;
                pixel.dataset.id = getPixelId(row, col);
                pixel.addEventListener("click", (e) => { e.stopPropagation(); onPixelClick(row, col); });
                gridContainer.appendChild(pixel);
            }
            gridRendered = true;
        }
        for (let i = 0; i < TOTAL_PIXELS; i++) {
            const pixelDiv = gridContainer.children[i];
            if (pixelDiv) { pixelDiv.style.backgroundColor = pixelData[i] || COLOR_PALETTE[0]; }
        }
    }
    
    function updatePixelUI(row, col, colorHex) {
        const index = row * SIZE + col;
        if (index >= 0 && index < TOTAL_PIXELS) {
            pixelData[index] = colorHex;
            const pixelDiv = gridContainer.children[index];
            if (pixelDiv) pixelDiv.style.backgroundColor = colorHex;
        }
    }
    
    function loadInitialFromFirebase() {
        const pixelsRef = db.ref("pixels");
        pixelsRef.once("value", (snapshot) => {
            const fbData = snapshot.val();
            if (fbData && typeof fbData === "object") {
                for (const [pixelId, colorValue] of Object.entries(fbData)) {
                    if (typeof colorValue === "string" && colorValue.length > 0) {
                        const { row, col } = parseIdToCoords(pixelId);
                        if (!isNaN(row) && !isNaN(col) && row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                            const idx = row * SIZE + col;
                            pixelData[idx] = colorValue;
                        }
                    }
                }
            }
            renderFullGrid();
        }).catch(err => console.warn(err));
        
        pixelsRef.on("child_changed", (snapshot) => {
            const pixelId = snapshot.key;
            const newColor = snapshot.val();
            if (pixelId && newColor && typeof newColor === "string") {
                const { row, col } = parseIdToCoords(pixelId);
                if (!isNaN(row) && !isNaN(col) && row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                    updatePixelUI(row, col, newColor);
                }
            }
        });
        
        pixelsRef.on("child_added", (snapshot) => {
            const pixelId = snapshot.key;
            const newColor = snapshot.val();
            if (pixelId && newColor && typeof newColor === "string") {
                const { row, col } = parseIdToCoords(pixelId);
                if (!isNaN(row) && !isNaN(col) && row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                    updatePixelUI(row, col, newColor);
                }
            }
        });
    }
    
    async function setPixelColor(row, col, colorHex) {
        updatePixelUI(row, col, colorHex);
        const pixelId = getPixelId(row, col);
        const pixelRef = db.ref(`pixels/${pixelId}`);
        try {
            await pixelRef.set(colorHex);
        } catch (err) {
            alert("Не удалось сохранить цвет. Проверь правила БД.");
        }
    }
    
    function onPixelClick(row, col) { setPixelColor(row, col, currentColor); }
    
    function buildPalette() {
        paletteDiv.innerHTML = "";
        COLOR_PALETTE.forEach((colorHex, idx) => {
            const swatch = document.createElement("div");
            swatch.className = "color-swatch";
            swatch.style.backgroundColor = colorHex;
            swatch.setAttribute("data-color", colorHex);
            if (colorHex === currentColor) swatch.classList.add("active");
            swatch.addEventListener("click", () => {
                currentColor = colorHex;
                document.querySelectorAll(".color-swatch").forEach(el => el.classList.remove("active"));
                swatch.classList.add("active");
            });
            paletteDiv.appendChild(swatch);
        });
    }
    
    function init() {
        buildPalette();
        loadInitialFromFirebase();
        document.getElementById("liveStatus").innerText = "🔥 онлайн синхронизация";
    }
    
    window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>R-pixel</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { user-select: none; margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #0a0c12; overflow: hidden; font-family: monospace; }
        .map-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0c12; }
        .canvas-wrapper { position: absolute; top: 0; left: 0; transform-origin: 0 0; cursor: grab; }
        .canvas-wrapper:active { cursor: grabbing; }
        .pixel-grid { display: grid; grid-template-columns: repeat(150, 12px); background-color: #1e212b; border: 1px solid #2e2f3e; }
        .pixel { width: 12px; height: 12px; background-color: #2b2b2b; }
        .palette-container { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 100; }
        .cooldown-bar-wrapper { width: 300px; height: 40px; background: #1e1f2c; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 1px solid #3a3f55; }
        .cooldown-bar-fill { position: absolute; top: 0; height: 100%; background: linear-gradient(90deg, #ff6600, #ffaa33); width: 100%; border-radius: 20px; transform-origin: center; transform: scaleX(1); transition: transform 0.1s linear; }
        .cooldown-bar-left { position: absolute; top: 0; left: 0; height: 100%; width: 50%; overflow: hidden; border-radius: 20px 0 0 20px; }
        .cooldown-bar-right { position: absolute; top: 0; right: 0; height: 100%; width: 50%; overflow: hidden; border-radius: 0 20px 20px 0; }
        .cooldown-bar-left .cooldown-bar-fill { right: 0; transform-origin: right center; }
        .cooldown-bar-right .cooldown-bar-fill { left: 0; transform-origin: left center; }
        .cooldown-timer-center { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: bold; text-shadow: 0 0 5px black; z-index: 2; font-family: monospace; pointer-events: none; }
        .palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 8px 12px; background: #1e1f2ccc; backdrop-filter: blur(8px); border-radius: 16px; pointer-events: auto; }
        .color-swatch { width: 36px; height: 36px; border-radius: 8px; cursor: pointer; border: 2px solid #fff; }
        .color-swatch.active { border: 3px solid #ff0; transform: scale(1.05); }
        .zoom-info { position: fixed; top: 16px; right: 16px; background: #1e1f2ccc; backdrop-filter: blur(8px); padding: 4px 12px; border-radius: 16px; color: white; font-size: 14px; z-index: 100; pointer-events: none; }
        .slot-info { position: fixed; bottom: 80px; left: 16px; background: #1e1f2ccc; backdrop-filter: blur(8px); padding: 8px 12px; border-radius: 16px; color: white; font-size: 12px; z-index: 100; font-family: monospace; pointer-events: auto; }
        .slot-info span { display: inline-block; width: 28px; height: 28px; border-radius: 6px; margin: 0 4px; vertical-align: middle; border: 2px solid #fff; cursor: pointer; }
        .slot-info .slot-label { display: inline-block; margin: 0 6px 0 0; cursor: default; }
        .slot-info .active-slot { border: 2px solid #ff0; box-shadow: 0 0 6px #ff0; }
        .welcome-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 200; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s ease; }
        .welcome-card { background: linear-gradient(135deg, #1e1f2c, #14161f); border-radius: 24px; padding: 24px 32px; max-width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.5); animation: popIn 0.4s cubic-bezier(0.34, 1.2, 0.64, 1); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .welcome-card h2 { font-size: 32px; margin-bottom: 12px; background: linear-gradient(135deg, #ffcc33, #ff9933); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .welcome-card p { color: #ddd; font-size: 16px; margin: 12px 0; line-height: 1.5; }
        .feature-list { text-align: left; margin: 20px 0; padding-left: 0; list-style: none; }
        .feature-list li { color: #ffaa44; margin: 10px 0; font-size: 14px; }
        .feature-list li span { color: #ccc; }
        .close-btn { background: #ff6600; border: none; color: white; padding: 12px 28px; border-radius: 40px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 16px; transition: all 0.2s; font-family: monospace; }
        .close-btn:hover { background: #ff4400; transform: scale(1.02); }
        @media (max-width: 600px) { 
            .welcome-card { margin: 20px; padding: 20px; } 
            .welcome-card h2 { font-size: 24px; } 
            .color-swatch { width: 28px; height: 28px; } 
            .palette { gap: 6px; padding: 6px 10px; } 
            .pixel { width: 8px; height: 8px; } 
            .pixel-grid { grid-template-columns: repeat(150, 8px); } 
            .slot-info { display: none; } 
            .cooldown-bar-wrapper { width: 260px; height: 36px; }
            .cooldown-timer-center { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="map-container" id="mapContainer">
    <div class="canvas-wrapper" id="canvasWrapper">
        <div class="pixel-grid" id="pixelGrid"></div>
    </div>
</div>
<div class="zoom-info" id="zoomInfo">zoom: 1x</div>
<div class="slot-info" id="slotInfo">
    <span class="slot-label">🎨</span>
    <span id="slot1Color"></span>
    <span id="slot2Color"></span>
</div>
<div class="palette-container">
    <div class="cooldown-bar-wrapper" id="cooldownWrapper" style="display: none;">
        <div class="cooldown-bar-left">
            <div class="cooldown-bar-fill" id="cooldownFillLeft"></div>
        </div>
        <div class="cooldown-bar-right">
            <div class="cooldown-bar-fill" id="cooldownFillRight"></div>
        </div>
        <div class="cooldown-timer-center" id="cooldownTimer">10</div>
    </div>
    <div class="palette" id="colorPalette"></div>
</div>

<div id="welcomeOverlay" class="welcome-overlay">
    <div class="welcome-card" id="welcomeCard">
        <h2>R-PIXEL</h2>
        <p>Коллективное пиксельное полотно 150x150</p>
        <ul class="feature-list" id="featureList">
            <li>• <span>Загрузка...</span></li>
        </ul>
        <button class="close-btn" id="closeWelcome">ПРИСТУПИТЬ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA-ebYwVRC_1XC4TQ9Xv04eD8Gcsj8gb2A",
        authDomain: "r-pixel.firebaseapp.com",
        databaseURL: "https://r-pixel-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "r-pixel",
        storageBucket: "r-pixel.firebasestorage.app",
        messagingSenderId: "324759212498",
        appId: "1:324759212498:web:92e4032fc10055d8bbf80b",
        measurementId: "G-5VVF2Q7K8L"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const SIZE = 150;
    const TOTAL_PIXELS = SIZE * SIZE;
    const PIXEL_SIZE = window.innerWidth <= 600 ? 8 : 12;
    const COOLDOWN_SECONDS = 10;
    const COLOR_PALETTE = ["#2b2b2b","#8b3c2c","#d64531","#e8b84c","#6aa84f","#3b6e4b","#2c5e6e","#4c76b0","#6f4f8c","#bc85a3","#d4c4a8","#f7f3e0"];
    let pixelData = new Array(TOTAL_PIXELS).fill(COLOR_PALETTE[0]);
    let currentColor = COLOR_PALETTE[1];
    
    let slot1Color = COLOR_PALETTE[5];
    let slot2Color = COLOR_PALETTE[7];
    let activeSlot = 1;
    
    let gridRendered = false;
    let isOnCooldown = false;
    let cooldownInterval = null;
    
    const gridContainer = document.getElementById("pixelGrid");
    const paletteDiv = document.getElementById("colorPalette");
    const canvasWrapper = document.getElementById("canvasWrapper");
    const mapContainer = document.getElementById("mapContainer");
    const zoomInfo = document.getElementById("zoomInfo");
    const slot1Span = document.getElementById("slot1Color");
    const slot2Span = document.getElementById("slot2Color");
    const cooldownWrapper = document.getElementById("cooldownWrapper");
    const cooldownTimer = document.getElementById("cooldownTimer");
    const cooldownFillLeft = document.getElementById("cooldownFillLeft");
    const cooldownFillRight = document.getElementById("cooldownFillRight");
    
    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let lastTranslateX = 0;
    let lastTranslateY = 0;
    let hasMoved = false;
    let isDrawing = false;
    
    let touchStartTime = 0;
    let touchMoved = false;
    let touchStartX = 0, touchStartY = 0;
    let lastTapTime = 0;
    let tapDebounce = 100;
    
    const isMobile = window.innerWidth <= 600 || ('ontouchstart' in window);
    
    function updateCooldownBar(remaining) {
        const percent = remaining / COOLDOWN_SECONDS;
        const scaleX = percent;
        cooldownFillLeft.style.transform = `scaleX(${scaleX})`;
        cooldownFillRight.style.transform = `scaleX(${scaleX})`;
        cooldownTimer.innerText = remaining;
    }
    
    function startCooldown() {
        if (cooldownInterval) clearInterval(cooldownInterval);
        isOnCooldown = true;
        let remaining = COOLDOWN_SECONDS;
        cooldownWrapper.style.display = "block";
        updateCooldownBar(remaining);
        
        cooldownInterval = setInterval(() => {
            remaining--;
            updateCooldownBar(remaining);
            if (remaining <= 0) {
                clearInterval(cooldownInterval);
                cooldownInterval = null;
                isOnCooldown = false;
                cooldownWrapper.style.display = "none";
            }
        }, 1000);
    }
    
    function updateTransform() {
        canvasWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        zoomInfo.innerText = `zoom: ${scale.toFixed(1)}x`;
    }
    
    function centerCanvas() {
        const gridWidth = SIZE * PIXEL_SIZE * scale;
        const gridHeight = SIZE * PIXEL_SIZE * scale;
        translateX = (window.innerWidth - gridWidth) / 2;
        translateY = (window.innerHeight - gridHeight) / 2;
        updateTransform();
    }
    
    function updateSlotsDisplay() {
        slot1Span.style.backgroundColor = slot1Color;
        slot2Span.style.backgroundColor = slot2Color;
        if (activeSlot === 1) {
            slot1Span.classList.add("active-slot");
            slot2Span.classList.remove("active-slot");
        } else {
            slot1Span.classList.remove("active-slot");
            slot2Span.classList.add("active-slot");
        }
    }
    
    function switchSlot() {
        activeSlot = activeSlot === 1 ? 2 : 1;
        currentColor = activeSlot === 1 ? slot1Color : slot2Color;
        updateSlotsDisplay();
        updateActiveSwatch();
    }
    
    function setSlot1() {
        slot1Color = currentColor;
        activeSlot = 1;
        currentColor = slot1Color;
        updateSlotsDisplay();
        updateActiveSwatch();
    }
    
    function setSlot2() {
        slot2Color = currentColor;
        activeSlot = 2;
        currentColor = slot2Color;
        updateSlotsDisplay();
        updateActiveSwatch();
    }
    
    function onKeyDown(e) {
        if (isMobile) return;
        const key = e.key;
        if (key === '1') { e.preventDefault(); setSlot1(); }
        else if (key === '2') { e.preventDefault(); setSlot2(); }
        else if (key === ' ') { e.preventDefault(); switchSlot(); }
    }
    
    function updateActiveSwatch() {
        const swatches = document.querySelectorAll(".color-swatch");
        swatches.forEach(el => {
            if (el.style.backgroundColor === currentColor) el.classList.add("active");
            else el.classList.remove("active");
        });
    }
    
    function onMouseDown(e) {
        if (e.button === 0) {
            isDragging = true;
            hasMoved = false;
            dragStartX = e.clientX - translateX;
            dragStartY = e.clientY - translateY;
            lastTranslateX = translateX;
            lastTranslateY = translateY;
            canvasWrapper.style.cursor = "grabbing";
            e.preventDefault();
        }
    }
    
    function onMouseMove(e) {
        if (isDragging) {
            const newTranslateX = e.clientX - dragStartX;
            const newTranslateY = e.clientY - dragStartY;
            if (!hasMoved && (Math.abs(newTranslateX - lastTranslateX) > 3 || Math.abs(newTranslateY - lastTranslateY) > 3)) hasMoved = true;
            translateX = newTranslateX;
            translateY = newTranslateY;
            updateTransform();
        } else if (isDrawing && !isMobile) {
            const elements = document.elementsFromPoint(e.clientX, e.clientY);
            for (let el of elements) {
                if (el.classList && el.classList.contains('pixel')) {
                    const row = parseInt(el.dataset.row);
                    const col = parseInt(el.dataset.col);
                    if (!isNaN(row) && !isNaN(col)) {
                        setPixelColor(row, col, currentColor);
                    }
                    break;
                }
            }
        }
    }
    
    function onMouseUp(e) {
        if (isDragging) {
            isDragging = false;
            canvasWrapper.style.cursor = "grab";
        }
        if (isDrawing) isDrawing = false;
    }
    
    function onContextMenu(e) { e.preventDefault(); return false; }
    
    function onRightMouseDown(e) {
        if (isMobile) return;
        if (e.button === 2) {
            isDrawing = true;
            const elements = document.elementsFromPoint(e.clientX, e.clientY);
            for (let el of elements) {
                if (el.classList && el.classList.contains('pixel')) {
                    const row = parseInt(el.dataset.row);
                    const col = parseInt(el.dataset.col);
                    if (!isNaN(row) && !isNaN(col)) {
                        setPixelColor(row, col, currentColor);
                    }
                    break;
                }
            }
            e.preventDefault();
            return false;
        }
    }
    
    function onWheel(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        let newScale = scale + delta;
        newScale = Math.min(Math.max(0.3, newScale), 3);
        if (newScale === scale) return;
        const rect = mapContainer.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const beforeX = (mouseX - translateX) / scale;
        const beforeY = (mouseY - translateY) / scale;
        scale = newScale;
        const afterX = (mouseX - translateX) / scale;
        const afterY = (mouseY - translateY) / scale;
        translateX += (afterX - beforeX) * scale;
        translateY += (afterY - beforeY) * scale;
        updateTransform();
    }
    
    let touchStartDistance = 0;
    let touchStartScale = 1;
    let initialPinchX = 0, initialPinchY = 0;
    
    function getTouchDistance(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }
    
    function getTouchCenter(touches) {
        return {
            x: (touches[0].clientX + touches[1].clientX) / 2,
            y: (touches[0].clientY + touches[1].clientY) / 2
        };
    }
    
    function getPixelUnderTouch(clientX, clientY) {
        const elements = document.elementsFromPoint(clientX, clientY);
        for (let el of elements) {
            if (el.classList && el.classList.contains('pixel')) {
                const row = parseInt(el.dataset.row);
                const col = parseInt(el.dataset.col);
                if (!isNaN(row) && !isNaN(col)) return { row, col, element: el };
            }
        }
        return null;
    }
    
    function onTouchStart(e) {
        e.preventDefault();
        
        if (e.touches.length === 1) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            isDragging = true;
            touchMoved = false;
            touchStartTime = Date.now();
            dragStartX = e.touches[0].clientX - translateX;
            dragStartY = e.touches[0].clientY - translateY;
            lastTranslateX = translateX;
            lastTranslateY = translateY;
        } else if (e.touches.length === 2) {
            isDragging = false;
            isDrawing = false;
            touchStartDistance = getTouchDistance(e.touches);
            touchStartScale = scale;
            const center = getTouchCenter(e.touches);
            initialPinchX = (center.x - translateX) / scale;
            initialPinchY = (center.y - translateY) / scale;
        }
    }
    
    function onTouchMove(e) {
        e.preventDefault();
        
        if (e.touches.length === 1 && isDragging) {
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const dx = Math.abs(currentX - touchStartX);
            const dy = Math.abs(currentY - touchStartY);
            
            if (dx > 5 || dy > 5) {
                touchMoved = true;
            }
            
            const newTranslateX = e.touches[0].clientX - dragStartX;
            const newTranslateY = e.touches[0].clientY - dragStartY;
            translateX = newTranslateX;
            translateY = newTranslateY;
            updateTransform();
        } else if (e.touches.length === 2) {
            if (isDrawing) isDrawing = false;
            isDragging = false;
            
            const newDistance = getTouchDistance(e.touches);
            if (touchStartDistance > 0) {
                let newScale = touchStartScale * (newDistance / touchStartDistance);
                newScale = Math.min(Math.max(0.3, newScale), 3);
                if (newScale !== scale) {
                    const center = getTouchCenter(e.touches);
                    const beforeX = (center.x - translateX) / scale;
                    const beforeY = (center.y - translateY) / scale;
                    scale = newScale;
                    const afterX = (center.x - translateX) / scale;
                    const afterY = (center.y - translateY) / scale;
                    translateX += (afterX - beforeX) * scale;
                    translateY += (afterY - beforeY) * scale;
                    updateTransform();
                }
            }
        }
    }
    
    function onTouchEnd(e) {
        e.preventDefault();
        
        const wasDragging = isDragging;
        const now = Date.now();
        
        isDragging = false;
        isDrawing = false;
        
        if (wasDragging && !touchMoved && (now - touchStartTime) < 200) {
            if (now - lastTapTime > tapDebounce) {
                const pixel = getPixelUnderTouch(touchStartX, touchStartY);
                if (pixel) {
                    setPixelColor(pixel.row, pixel.col, currentColor);
                    lastTapTime = now;
                }
            }
        }
        
        touchMoved = false;
        touchStartDistance = 0;
    }
    
    mapContainer.addEventListener("mousedown", onMouseDown);
    mapContainer.addEventListener("mousemove", onMouseMove);
    mapContainer.addEventListener("mouseup", onMouseUp);
    mapContainer.addEventListener("wheel", onWheel, { passive: false });
    mapContainer.addEventListener("contextmenu", onContextMenu);
    mapContainer.addEventListener("mousedown", onRightMouseDown);
    mapContainer.addEventListener("touchstart", onTouchStart, { passive: false });
    mapContainer.addEventListener("touchmove", onTouchMove, { passive: false });
    mapContainer.addEventListener("touchend", onTouchEnd);
    mapContainer.addEventListener("touchcancel", onTouchEnd);
    window.addEventListener("keydown", onKeyDown);
    
    function getPixelId(row, col) { return `${row}_${col}`; }
    function parseIdToCoords(id) { const [row, col] = id.split("_").map(Number); return { row, col }; }
    
    function renderFullGrid() {
        if (!gridContainer) return;
        if (!gridRendered) {
            gridContainer.innerHTML = "";
            gridContainer.style.gridTemplateColumns = `repeat(${SIZE}, ${PIXEL_SIZE}px)`;
            for (let i = 0; i < TOTAL_PIXELS; i++) {
                const row = Math.floor(i / SIZE);
                const col = i % SIZE;
                const pixel = document.createElement("div");
                pixel.className = "pixel";
                pixel.style.width = `${PIXEL_SIZE}px`;
                pixel.style.height = `${PIXEL_SIZE}px`;
                pixel.dataset.row = row;
                pixel.dataset.col = col;
                
                pixel.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (hasMoved) return;
                    setPixelColor(row, col, currentColor);
                });
                
                if (!isMobile) {
                    pixel.addEventListener("mouseenter", () => {
                        if (isDrawing) setPixelColor(row, col, currentColor);
                    });
                }
                
                gridContainer.appendChild(pixel);
            }
            gridRendered = true;
        }
        for (let i = 0; i < TOTAL_PIXELS; i++) {
            const pixelDiv = gridContainer.children[i];
            if (pixelDiv) pixelDiv.style.backgroundColor = pixelData[i] || COLOR_PALETTE[0];
        }
    }
    
    function updatePixelUI(row, col, colorHex) {
        const index = row * SIZE + col;
        if (index >= 0 && index < TOTAL_PIXELS) {
            pixelData[index] = colorHex;
            const pixelDiv = gridContainer.children[index];
            if (pixelDiv) pixelDiv.style.backgroundColor = colorHex;
        }
    }
    
    function loadInitialFromFirebase() {
        const pixelsRef = db.ref("pixels");
        pixelsRef.once("value", (snapshot) => {
            const fbData = snapshot.val();
            if (fbData && typeof fbData === "object") {
                for (const [pixelId, colorValue] of Object.entries(fbData)) {
                    if (typeof colorValue === "string" && colorValue.length > 0) {
                        const { row, col } = parseIdToCoords(pixelId);
                        if (!isNaN(row) && !isNaN(col) && row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                            const idx = row * SIZE + col;
                            pixelData[idx] = colorValue;
                        }
                    }
                }
            }
            renderFullGrid();
        }).catch(err => console.warn(err));
        
        pixelsRef.on("child_changed", (snapshot) => {
            const pixelId = snapshot.key;
            const newColor = snapshot.val();
            if (pixelId && newColor && typeof newColor === "string") {
                const { row, col } = parseIdToCoords(pixelId);
                if (!isNaN(row) && !isNaN(col) && row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                    updatePixelUI(row, col, newColor);
                }
            }
        });
        
        pixelsRef.on("child_added", (snapshot) => {
            const pixelId = snapshot.key;
            const newColor = snapshot.val();
            if (pixelId && newColor && typeof newColor === "string") {
                const { row, col } = parseIdToCoords(pixelId);
                if (!isNaN(row) && !isNaN(col) && row >= 0 && row < SIZE && col >= 0 && col < SIZE) {
                    updatePixelUI(row, col, newColor);
                }
            }
        });
    }
    
    async function setPixelColor(row, col, colorHex) {
        if (isOnCooldown) return;
        
        const pixelId = getPixelId(row, col);
        const currentColorAtPixel = pixelData[row * SIZE + col];
        if (currentColorAtPixel === colorHex) return;
        
        updatePixelUI(row, col, colorHex);
        try { await db.ref(`pixels/${pixelId}`).set(colorHex); } catch(err) { console.warn(err); }
        
        startCooldown();
    }
    
    function buildPalette() {
        paletteDiv.innerHTML = "";
        COLOR_PALETTE.forEach((colorHex) => {
            const swatch = document.createElement("div");
            swatch.className = "color-swatch";
            swatch.style.backgroundColor = colorHex;
            if (colorHex === currentColor) swatch.classList.add("active");
            swatch.addEventListener("click", () => {
                currentColor = colorHex;
                document.querySelectorAll(".color-swatch").forEach(el => el.classList.remove("active"));
                swatch.classList.add("active");
            });
            paletteDiv.appendChild(swatch);
        });
    }
    
    function initWelcomePopup() {
        const overlay = document.getElementById('welcomeOverlay');
        const closeBtn = document.getElementById('closeWelcome');
        const featureList = document.getElementById('featureList');
        
        let featuresHtml = '';
        if (isMobile) {
            featuresHtml = `
                <li>• <span>Тап по пикселю — поставить цвет</span></li>
                <li>• <span>Один палец — перемещать карту</span></li>
                <li>• <span>Два пальца (щипок) — приближать/отдалять</span></li>
                <li>• <span>Выбирай цвет в палитре снизу</span></li>
                <li>• <span>⏱️ 10 секунд между покрасками</span></li>
            `;
        } else {
            featuresHtml = `
                <li>• <span>ЛКМ + тащить — перемещать карту</span></li>
                <li>• <span>Клик по пикселю — поставить цвет</span></li>
                <li>• <span>ПКМ + вести — рисовать кистью</span></li>
                <li>• <span>Колёсико мыши — приближать/отдалять</span></li>
                <li>• <span>1 / 2 — сохранить цвет в слот</span></li>
                <li>• <span>Пробел — переключить слот</span></li>
                <li>• <span>Клик по цвету в палитре — выбрать цвет</span></li>
                <li>• <span>⏱️ 10 секунд между покрасками</span></li>
            `;
        }
        featureList.innerHTML = featuresHtml;
        
        function closePopup() {
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }
        closeBtn.addEventListener('click', closePopup);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });
    }
    
    function init() {
        buildPalette();
        loadInitialFromFirebase();
        centerCanvas();
        canvasWrapper.style.cursor = "grab";
        initWelcomePopup();
        updateSlotsDisplay();
        
        slot1Span.addEventListener('click', () => setSlot1());
        slot2Span.addEventListener('click', () => setSlot2());
    }
    
    window.addEventListener("resize", () => centerCanvas());
    window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
